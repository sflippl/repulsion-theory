# @package _global_.evaluation
#
# Example evaluation suite:
#   1. Hidden representations from stream 0 at the output layer, logged at
#      geometrically-spaced steps (factor 2 → steps 0, 1, 2, 4, 8, 16, …).
#   2. Combined per-slot loss, logged at geometrically-spaced steps.
#
# Use eval_every_steps: N instead of eval_every_log_steps for fixed intervals.

evaluations:
  - name: representations
    task: autoencoding
    save: representation
    layer: output
    network: 0
    eval_every_log_steps: 2.0

  - name: loss_probe
    task: autoencoding
    save: loss
    eval_every_log_steps: 2.0
